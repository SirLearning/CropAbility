# CropAbility — minimal Conda base (Python + Rust toolchain + bioinformatics)
#
# Full setup (conda + pip + Rust extension) in one command:
#   python install.py              # GPU (CUDA PyTorch + Triton)
#   python install.py --cpu        # CPU-only PyTorch
#
# Manual steps after conda only:
#   conda activate cropability
#   pip install -r requirements-gpu.txt   # or requirements-cpu.txt
#   python install.py --skip-conda --skip-pip   # maturin only

name: cropability

channels:
  - conda-forge
  - bioconda

variables:
  RUST_BACKTRACE: "1"

dependencies:
  - python=3.11
  - rust>=1.75
  - cmake
  - pkg-config
  - gcc_linux-64
  - gxx_linux-64
  - libclang
  - htslib
  - samtools
  - bcftools
  - bedtools
  - pip
